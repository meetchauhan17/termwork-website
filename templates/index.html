<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termwork Generator Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-gradient-primary text-white p-4 text-center">
                    <h2 class="fw-bold mb-0"><i class="fa-solid fa-file-pdf me-2"></i>Termwork Generator Pro</h2>
                    <p class="mb-0 mt-2 opacity-75">Automate your multi-page termwork in seconds</p>
                </div>
                
                <div class="card-body p-5 bg-light">
                    <!-- Status Messages -->
                    <div id="alert-container"></div>
                    
                    <form id="termwork-form" novalidate>
                        
                        <div class="row g-4 mb-4">
                            <!-- Student Details Section -->
                            <div class="col-12">
                                <h5 class="section-title"><i class="fa-solid fa-user-graduate me-2"></i>Student Details</h5>
                                <hr>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Name of Student <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" name="name" required placeholder="e.g. John Doe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">PEN (Enrollment No) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" name="pen" required placeholder="e.g. 190XXXXX">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Class</label>
                                <input type="text" class="form-control" name="class" placeholder="e.g. B.Tech CS">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Batch</label>
                                <input type="text" class="form-control" name="batch" placeholder="e.g. A1">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Semester</label>
                                <input type="text" class="form-control" name="semester" placeholder="e.g. 6th">
                            </div>

                            <!-- Subject & Academic Details -->
                            <div class="col-12 mt-5">
                                <h5 class="section-title"><i class="fa-solid fa-book me-2"></i>Academic Details</h5>
                                <hr>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="subject" required placeholder="e.g. Cloud Computing">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Term</label>
                                <input type="text" class="form-control" name="term" placeholder="e.g. Even 2024">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Checked By (Faculty Name)</label>
                                <input type="text" class="form-control" name="checked_by" placeholder="e.g. Prof. Smith">
                            </div>

                            <!-- Practical Settings -->
                            <div class="col-12 mt-5">
                                <h5 class="section-title"><i class="fa-solid fa-flask me-2"></i>Practicals Configuration</h5>
                                <hr>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Number of Practicals <span class="text-danger">*</span></label>
                                <input type="number" class="form-control form-control-lg bg-white" id="practical-count" name="practical_count" min="1" max="50" required placeholder="0">
                            </div>

                            <div class="col-12">
                                <!-- Dynamic Fields Container -->
                                <div id="dynamic-titles-container" class="mt-3 row g-3"></div>
                            </div>

                        </div>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5 pt-3 border-top">
                            <button type="button" class="btn btn-outline-secondary btn-lg px-4" id="btn-load-data">
                                <i class="fa-solid fa-clock-rotate-left me-2"></i>Load Last Data
                            </button>
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow text-white" id="btn-generate">
                                <i class="fa-solid fa-gears me-2"></i>Generate Termwork
                            </button>
                        </div>
                    </form>
                    
                    <!-- Loading State -->
                    <div id="loading-overlay" class="d-none">
                        <div class="text-center text-white">
                            <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status"></div>
                            <h4 class="mt-3 fw-bold text-dark">Generating your document...</h4>
                            <p class="text-muted">This may take a few seconds.</p>
                        </div>
                    </div>

                    <!-- Success State -->
                    <div id="success-state" class="d-none text-center py-5">
                        <div class="mb-4">
                            <i class="fa-solid fa-circle-check text-success" style="font-size: 5rem;"></i>
                        </div>
                        <h3 class="fw-bold mb-3">Generation Complete!</h3>
                        <p class="text-muted mb-4">Your termwork has been generated successfully.</p>
                        <div class="d-flex justify-content-center gap-3">
                            <a href="#" id="download-pdf-btn" class="btn btn-danger btn-lg px-4">
                                <i class="fa-solid fa-file-pdf me-2"></i>Download PDF
                            </a>
                            <a href="#" id="download-docx-btn" class="btn btn-primary btn-lg px-4">
                                <i class="fa-solid fa-file-word me-2"></i>Download DOCX
                            </a>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-link text-decoration-none" id="btn-create-another">
                                <i class="fa-solid fa-arrow-rotate-left me-1"></i>Create Another
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap & Custom JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.css"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
